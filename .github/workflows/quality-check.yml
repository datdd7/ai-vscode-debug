name: Quality Check

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

env:
  NODE_VERSION: '20'
  WORKING_DIR: ./ai-debug-proxy

jobs:
  # ==========================================================================
  # 1. LINT & CODE STYLE
  # ==========================================================================
  lint:
    name: 🔍 Lint & Code Style
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ai-debug-proxy/package-lock.json
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Run ESLint
        run: npm run lint
        continue-on-error: false
      
      - name: Check formatting (Prettier)
        run: npx prettier --check "src/**/*.ts" "tests/**/*.ts" 2>/dev/null || echo "Prettier not configured, skipping..."
        continue-on-error: true

  # ==========================================================================
  # 2. TYPE SAFETY
  # ==========================================================================
  type-check:
    name: 📘 Type Safety
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ai-debug-proxy/package-lock.json
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: TypeScript Compiler Check
        run: npm run lint
        continue-on-error: false
      
      - name: Check for any type errors
        run: npx tsc --noEmit --pretty
        continue-on-error: false

  # ==========================================================================
  # 3. UNIT TESTS
  # ==========================================================================
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ai-debug-proxy/package-lock.json
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Run Jest Unit Tests
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=json-summary
        continue-on-error: false
      
      - name: Upload coverage to GitHub
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ai-debug-proxy/coverage/coverage-summary.json
          retention-days: 7
      
      - name: Test Summary
        run: |
          echo "### 📊 Test Summary" >> $GITHUB_STEP_SUMMARY
          npm test 2>&1 | tail -15 >> $GITHUB_STEP_SUMMARY

  # ==========================================================================
  # 4. BUILD & PACKAGE
  # ==========================================================================
  build:
    name: 🔨 Build & Package
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ai-debug-proxy/package-lock.json
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Build (esbuild)
        run: npm run compile
        continue-on-error: false
      
      - name: Package Extension
        run: npm run package
        continue-on-error: false
      
      - name: Verify VSIX created
        run: |
          ls -lh *.vsix
          echo "VSIX file size: $(du -h *.vsix | cut -f1)"
      
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-debug-proxy-vsix
          path: ai-debug-proxy/*.vsix
          retention-days: 7

  # ==========================================================================
  # 5. E2E TESTS
  # ==========================================================================
  e2e-tests:
    name: 🎭 E2E Tests (Playwright)
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ai-debug-proxy/package-lock.json
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        continue-on-error: true
      
      - name: Run E2E Tests
        run: npm run test:e2e
        continue-on-error: true
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: ai-debug-proxy/playwright-report/
          retention-days: 7

  # ==========================================================================
  # 6. CONTRACT TESTS (Pact)
  # ==========================================================================
  contract-tests:
    name: 🤝 Contract Tests (Pact)
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ai-debug-proxy/package-lock.json
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Run Pact Consumer Tests
        run: npm run test:pact:consumer
        continue-on-error: true
      
      - name: Upload Pact pacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pact-pacts
          path: ai-debug-proxy/pacts/
          retention-days: 7

  # ==========================================================================
  # 7. SECURITY AUDIT
  # ==========================================================================
  security-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
      
      - name: Run npm audit (production only)
        run: npm audit --production --audit-level=high
        continue-on-error: false

  # ==========================================================================
  # 8. DEPENDENCY CHECK
  # ==========================================================================
  dependency-check:
    name: 📦 Dependency Check
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Check for outdated dependencies
        run: npm outdated || true
        continue-on-error: true
      
      - name: Verify lock file integrity
        run: |
          if [ -f "package-lock.json" ]; then
            echo "✅ package-lock.json exists"
            npm ls --all > /dev/null 2>&1 && echo "✅ Lock file integrity OK" || echo "⚠️ Lock file has issues"
          else
            echo "⚠️ No package-lock.json found"
          fi

  # ==========================================================================
  # 9. DOCUMENTATION CHECK
  # ==========================================================================
  docs-check:
    name: 📚 Documentation Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check README exists
        run: |
          test -f README.md && echo "✅ README.md exists" || echo "❌ README.md missing"
          test -f ai-debug-proxy/README.md && echo "✅ ai-debug-proxy/README.md exists" || echo "❌ ai-debug-proxy/README.md missing"
      
      - name: Check CHANGELOG
        run: |
          test -f ai-debug-proxy/CHANGELOG.md && echo "✅ CHANGELOG.md exists" || echo "❌ CHANGELOG.md missing"
      
      - name: Validate Markdown links (basic)
        run: |
          echo "Checking for broken markdown references..."
          grep -r "\[.*\](http" README.md ai-debug-proxy/README.md 2>/dev/null | head -5 || echo "No external links found"

  # ==========================================================================
  # 10. CODE COVERAGE THRESHOLD
  # ==========================================================================
  coverage-threshold:
    name: 📊 Coverage Threshold
    runs-on: ubuntu-latest
    needs: [unit-tests]
    
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ai-debug-proxy/package-lock.json
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Run tests with coverage
        run: npm test -- --coverage --coverageReporters=json
        continue-on-error: false
      
      - name: Check coverage threshold
        run: |
          echo "### Coverage Report" >> $GITHUB_STEP_SUMMARY
          cat coverage/coverage-summary.json | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          total = data['total']
          print(f\"Lines: {total['lines']['pct']}%\")
          print(f\"Statements: {total['statements']['pct']}%\")
          print(f\"Functions: {total['functions']['pct']}%\")
          print(f\"Branches: {total['branches']['pct']}%\")
          
          # Check minimum threshold (50% for now)
          if total['lines']['pct'] < 50:
              print('❌ Coverage below 50%')
              sys.exit(1)
          else:
              print('✅ Coverage above 50%')
          " || echo "Coverage check completed"

  # ==========================================================================
  # QUALITY SUMMARY
  # ==========================================================================
  quality-summary:
    name: 📋 Quality Summary
    runs-on: ubuntu-latest
    needs: [lint, type-check, unit-tests, build, security-audit, dependency-check, docs-check]
    
    if: always()
    
    steps:
      - name: Generate Quality Report
        run: |
          echo "## 🎯 Quality Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📘 Type Check | ${{ needs.type-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔨 Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎭 E2E Tests | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🤝 Contract Tests | ${{ needs.contract-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 Security Audit | ${{ needs.security-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Dependency Check | ${{ needs.dependency-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📚 Documentation | ${{ needs.docs-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📊 Coverage | ${{ needs.coverage-threshold.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Overall status
          FAILED_COUNT=0
          for result in "${{ needs.lint.result }}" "${{ needs.type-check.result }}" "${{ needs.unit-tests.result }}" "${{ needs.build.result }}"; do
            if [ "$result" != "success" ]; then
              FAILED_COUNT=$((FAILED_COUNT + 1))
            fi
          done
          
          if [ $FAILED_COUNT -eq 0 ]; then
            echo "### ✅ All Quality Gates PASSED" >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "### ❌ $FAILED_COUNT Quality Gate(s) FAILED" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
